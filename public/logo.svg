<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED" />
      <stop offset="100%" style="stop-color:#4F46E5" />
    </linearGradient>
  </defs>
  
  <!-- Anillo exterior -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#grad)" stroke-width="6" />
  
  <!-- Círculo interior -->
  <circle cx="100" cy="100" r="75" fill="url(#grad)" />
  
  <!-- Letra Q -->
  <text x="100" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="68" font-weight="300" fill="white" text-anchor="middle">Q</text>
</svg>
